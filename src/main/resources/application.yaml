spring:
  application:
    name: ecommerce


  datasource:
     url: jdbc:postgresql://localhost:5432/loja_db
     username: postgres
     password: backend#26
     driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
     ddl-auto: update
     show-sql: true
     properties:
       hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always